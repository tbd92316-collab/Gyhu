name: Build Android Screen Cast App (.apk)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java Development Kit (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'
          channel: 'stable'

      - name: Generate Android App Code Automatically
        run: |
          # 1. Create Flutter Project
          flutter create --org com.screencast --project-name screencast_app screencast_app

          # 2. Add dependencies
          cat << 'EOF' > screencast_app/pubspec.yaml
          name: screencast_app
          description: "Android Screen Casting App - HD 60FPS"
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            flutter_webrtc: ^0.9.48
            socket_io_client: ^2.0.3+1

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^3.0.0

          flutter:
            uses-material-design: true
          EOF

          # 3. AndroidManifest.xml
          cat << 'EOF' > screencast_app/android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE"/>
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_MEDIA_PROJECTION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>

              <application
                  android:label="ScreenCast App"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                        android:name="io.flutter.embedding.android.NormalTheme"
                        android:value="@style/NormalTheme"
                        />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>

                  <service
                      android:name=".ScreenCastService"
                      android:enabled="true"
                      android:exported="false"
                      android:foregroundServiceType="mediaProjection" />

                  <meta-data
                      android:name="flutterEmbedding"
                      android:value="2" />
              </application>
          </manifest>
          EOF

          # 4. Set minSdkVersion 21
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' screencast_app/android/app/build.gradle

          # 5. Native ScreenCastService.kt
          cat << 'EOF' > screencast_app/android/app/src/main/kotlin/com/screencast/screencast_app/ScreenCastService.kt
          package com.screencast.screencast_app

          import android.app.Notification
          import android.app.NotificationChannel
          import android.app.NotificationManager
          import android.app.Service
          import android.content.Intent
          import android.os.Build
          import android.os.IBinder
          import android.content.pm.ServiceInfo

          class ScreenCastService : Service() {
              override fun onBind(intent: Intent?): IBinder? = null

              override fun onStartCommand(intent: Intent?, flags: Int, startId: Int): Int {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      val channel = NotificationChannel("cast_channel", "Screen Cast", NotificationManager.IMPORTANCE_LOW)
                      val manager = getSystemService(NotificationManager::class.java)
                      manager.createNotificationChannel(channel)
                      
                      val notification = Notification.Builder(this, "cast_channel")
                          .setContentTitle("HD 60FPS Screen Casting Active")
                          .setContentText("Your screen is live streaming in HD quality")
                          .setSmallIcon(android.R.drawable.ic_dialog_info)
                          .build()
                      
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                          startForeground(1, notification, ServiceInfo.FOREGROUND_SERVICE_TYPE_MEDIA_PROJECTION)
                      } else {
                          startForeground(1, notification)
                      }
                  }
                  return START_NOT_STICKY
              }
          }
          EOF

          # 6. MainActivity.kt
          cat << 'EOF' > screencast_app/android/app/src/main/kotlin/com/screencast/screencast_app/MainActivity.kt
          package com.screencast.screencast_app

          import android.content.Intent
          import android.os.Build
          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel

          class MainActivity: FlutterActivity() {
              private val CHANNEL = "com.screencast/foreground"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "startForeground") {
                          startCastService()
                          result.success(true)
                      } else if (call.method == "stopForeground") {
                          stopCastService()
                          result.success(true)
                      } else {
                          result.notImplemented()
                      }
                  }
              }

              private fun startCastService() {
                  val intent = Intent(this, ScreenCastService::class.java)
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      startForegroundService(intent)
                  } else {
                      startService(intent)
                  }
              }

              private fun stopCastService() {
                  val intent = Intent(this, ScreenCastService::class.java)
                  stopService(intent)
              }
          }
          EOF

          # 7. High-Bitrate High-FPS Dart Code
          cat << 'EOF' > screencast_app/lib/main.dart
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'package:flutter_webrtc/flutter_webrtc.dart';
          import 'package:socket_io_client/socket_io_client.dart' as IO;

          void main() {
            runApp(const ScreenCastApp());
          }

          class ScreenCastApp extends StatelessWidget {
            const ScreenCastApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                title: 'Screen Cast HD',
                theme: ThemeData.dark(),
                home: const HomeScreen(),
              );
            }
          }

          class HomeScreen extends StatefulWidget {
            const HomeScreen({super.key});

            @override
            State<HomeScreen> createState() => _HomeScreenState();
          }

          class _HomeScreenState extends State<HomeScreen> {
            bool isCasting = false;
            MediaStream? _localStream;
            IO.Socket? socket;
            RTCPeerConnection? peerConnection;
            final TextEditingController _ipController = TextEditingController();
            static const platform = MethodChannel('com.screencast/foreground');

            void _connectAndCast() async {
              String ip = _ipController.text.trim();
              if (ip.isEmpty) {
                ScaffoldMessenger.of(context).showSnackBar(
                  const SnackBar(content: Text("Please enter PC IP address")),
                );
                return;
              }

              try {
                socket = IO.io('http://$ip:5000', IO.OptionBuilder().setTransports(['websocket']).build());
                
                socket?.onConnect((_) {
                  socket?.emit('request-cast');
                });

                socket?.on('cast-accepted', (_) async {
                  await _startScreenCapture();
                });

                socket?.on('cast-declined', (_) {
                  ScaffoldMessenger.of(context).showSnackBar(
                    const SnackBar(content: Text("PC declined cast request")),
                  );
                });

                socket?.on('webrtc-answer', (data) async {
                  var answer = RTCSessionDescription(data['sdp'], data['type']);
                  await peerConnection?.setRemoteDescription(answer);
                });

                socket?.on('webrtc-ice', (data) async {
                  var candidate = RTCIceCandidate(data['candidate'], data['sdpMid'], data['sdpMLineIndex']);
                  await peerConnection?.addCandidate(candidate);
                });

              } catch (e) {
                ScaffoldMessenger.of(context).showSnackBar(
                  SnackBar(content: Text("Connection Error: $e")),
                );
              }
            }

            // Function to force High Bitrate (6 Mbps to 10 Mbps) on WebRTC SDP
            String _setHighBitrate(String sdp) {
              return sdp.replaceAllMapped(
                RegExp(r'(m=video .*)'),
                (match) => '${match.group(1)}\r\nb=AS:8000\r\nb=TIAS:8000000',
              );
            }

            Future<void> _startScreenCapture() async {
              try {
                try {
                  await platform.invokeMethod('startForeground');
                } catch (e) {
                  debugPrint("Native service error: $e");
                }

                // HIGH QUALITY (1080p, 60 FPS) CONSTRAINTS
                final Map<String, dynamic> mediaConstraints = {
                  'audio': false,
                  'video': {
                    'mandatory': {
                      'minWidth': '1920',
                      'minHeight': '1080',
                      'minFrameRate': '60',
                    },
                    'optional': [
                      {'maxFrameRate': '60'},
                      {'minFrameRate': '60'},
                    ],
                  }
                };

                MediaStream stream = await navigator.mediaDevices.getDisplayMedia(mediaConstraints);
                
                setState(() {
                  _localStream = stream;
                  isCasting = true;
                });

                Map<String, dynamic> configuration = {
                  "iceServers": [{"urls": "stun:stun.l.google.com:19302"}],
                  "sdpSemantics": "unified-plan"
                };

                peerConnection = await createPeerConnection(configuration);

                _localStream?.getTracks().forEach((track) {
                  peerConnection?.addTrack(track, _localStream!);
                });

                peerConnection?.onIceCandidate = (candidate) {
                  socket?.emit('webrtc-ice', {
                    'candidate': candidate.candidate,
                    'sdpMid': candidate.sdpMid,
                    'sdpMLineIndex': candidate.sdpMLineIndex,
                  });
                };

                RTCSessionDescription offer = await peerConnection!.createOffer();
                
                // Inject High Bitrate into SDP
                String highBitrateSdp = _setHighBitrate(offer.sdp!);
                RTCSessionDescription modifiedOffer = RTCSessionDescription(highBitrateSdp, offer.type);

                await peerConnection!.setLocalDescription(modifiedOffer);

                socket?.emit('webrtc-offer', {'sdp': modifiedOffer.sdp, 'type': modifiedOffer.type});

              } catch (e) {
                _stopCasting();
                ScaffoldMessenger.of(context).showSnackBar(
                  SnackBar(content: Text("Cast error: $e")),
                );
              }
            }

            void _stopCasting() async {
              _localStream?.getTracks().forEach((track) => track.stop());
              peerConnection?.close();
              socket?.disconnect();
              setState(() {
                isCasting = false;
                _localStream = null;
              });
              
              try {
                await platform.invokeMethod('stopForeground');
              } catch (e) {
                debugPrint("Error stopping service: $e");
              }
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: const Text('Android Screen Cast (1080p 60FPS)'),
                  centerTitle: true,
                ),
                body: Padding(
                  padding: const EdgeInsets.all(20.0),
                  child: Center(
                    child: Column(
                      mainAxisAlignment: MainAxisAlignment.center,
                      children: [
                        Icon(
                          isCasting ? Icons.cast_connected : Icons.cast,
                          size: 100,
                          color: isCasting ? Colors.green : Colors.blueAccent,
                        ),
                        const SizedBox(height: 20),
                        if (!isCasting) ...[
                          TextField(
                            controller: _ipController,
                            decoration: const InputDecoration(
                              labelText: "Enter PC IP Address (e.g. 192.168.1.5)",
                              border: OutlineInputBorder(),
                            ),
                          ),
                          const SizedBox(height: 20),
                        ],
                        ElevatedButton(
                          style: ElevatedButton.styleFrom(
                            padding: const EdgeInsets.symmetric(horizontal: 40, vertical: 15),
                            backgroundColor: isCasting ? Colors.red : Colors.blue,
                          ),
                          onPressed: isCasting ? _stopCasting : _connectAndCast,
                          child: Text(
                            isCasting ? "Stop Casting" : "Start HD Cast",
                            style: const TextStyle(fontSize: 18, color: Colors.white),
                          ),
                        ),
                      ],
                    ),
                  ),
                ),
              );
            }
          }
          EOF

      - name: Install Dependencies
        working-directory: ./screencast_app
        run: flutter pub get

      - name: Build APK
        working-directory: ./screencast_app
        run: flutter build apk --release

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-ScreenCast-App-HD
          path: screencast_app/build/app/outputs/flutter-apk/app-release.apk
